<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="katex.min.css"/>
    <style>
        html, body {
          margin: 0;
          padding: 8px;
          background: transparent;
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100%;
          box-sizing: border-box;
        }
        #formula { font-size: 1.4em; color: #1a1a1a; }
        .error   { color: #cc0000; font-size: 0.85em; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>
<div id="formula"></div>
<script src="katex.min.js"></script>
<script>
    window.onload = function () {
      var el = document.getElementById("formula");
      if (typeof katex === "undefined") {
        el.className = "error";
        el.textContent = "Ошибка: katex_min.js не найден в assets/";
        return;
      }
      try {
        katex.render("$$formula$$", el, {
          throwOnError: false,
          displayMode: true
        });
      } catch (e) {
        el.className = "error";
        el.textContent = "KaTeX: " + e.message;
      }
    };
</script>
</body>
</html>
